<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TradeHive — Admin — Ads Verify</title>
<link rel="icon" href="https://i.postimg.cc/zGrrd2nM/file-000000002c1c71f5961173dac3a26453.png" />
<style>
  :root{
    --bg:#ffffff; --card:#ffffff; --text:#071014; --muted:#6b7280;
    --border:rgba(7,16,20,0.06); --gold1:#FFB703; --gold2:#F59E0B;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:Inter, Roboto, Arial, sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1100px;margin:18px auto;padding:16px}
  header.banner{box-shadow:0 6px 30px rgba(0,0,0,0.12);position:relative;z-index:999}
  .banner-inner{max-height:110px;overflow:hidden}
  .banner img{width:100%;height:60%;object-fit:cover;max-height:110px;width:100vw;display:block}
  main.card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:12px;padding:18px;box-shadow:0 10px 40px rgba(2,6,23,0.06);border:1px solid var(--border);margin-top:-40px}
  .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .title{font-size:20px;font-weight:900;margin:0}
  .small-muted{font-size:13px;color:var(--muted)}
  .grid{display:grid;grid-template-columns:1fr 340px;gap:16px}
  .list{display:flex;flex-direction:column;gap:12px}
  .ad-card{background:var(--card);border-radius:12px;padding:12px;border:1px solid var(--border);display:flex;gap:12px;align-items:flex-start}
  .ad-media{width:160px;height:120px;border-radius:8px;overflow:hidden;background:#f2f2f2;flex:0 0 160px}
  .ad-media img{width:100%;height:100%;object-fit:cover}
  .ad-body{flex:1;display:flex;flex-direction:column;gap:6px}
  .ad-title{font-weight:900}
  .ad-desc{color:var(--muted);font-size:13px}
  .ad-meta{display:flex;gap:12px;align-items:center;font-size:13px;color:var(--muted)}
  .ad-actions{display:flex;gap:8px;margin-top:8px}
  .btn{padding:8px 12px;border-radius:10px;border:0;cursor:pointer;font-weight:800}
  .btn.approve{background:linear-gradient(180deg,var(--gold1),var(--gold2));color:#071014}
  .btn.decline{background:#f3f4f6;color:#071014;border:1px solid var(--border)}
  .btn.view{background:transparent;border:1px dashed var(--border);color:var(--muted)}
  .badge{padding:6px 8px;border-radius:999px;font-weight:800;background:#f8fafc;border:1px solid var(--border);font-size:12px}
  .panel{background:var(--card);border-radius:12px;padding:12px;border:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
  .modal-backdrop{position:fixed;inset:0;display:none;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:2000}
  .modal{width:94%;max-width:880px;background:var(--card);border-radius:12px;padding:14px;max-height:90vh;overflow:auto}
  .modal-gallery{display:flex;gap:8px;flex-wrap:wrap}
  .modal-gallery img{width:180px;height:120px;object-fit:cover;border-radius:8px}
  @media (max-width:980px){
    .grid{grid-template-columns:1fr}
    .ad-media{width:120px;height:90px}
    .modal-gallery img{width:120px;height:80px}
  }
</style>
</head>
<body>
  <header class="banner" role="banner">
    <div class="banner-inner">
      <img src="https://i.postimg.cc/zGrrd2nM/file-000000002c1c71f5961173dac3a26453.png" alt="TradeHive banner">
    </div>
  </header>

  <div class="wrap">
    <main class="card" aria-labelledby="adminTitle">
      <div class="top-row">
        <div>
          <h1 id="adminTitle" class="title">Ads — Pending Approval</h1>
          <div class="small-muted">Review ads and approve or decline.</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="refreshInterval" style="padding:6px;border-radius:8px;border:1px solid var(--border)">
            <option value="0">Auto-refresh off</option>
            <option value="10">10s</option>
            <option value="30">30s</option>
            <option value="60">60s</option>
          </select>
          <button id="refreshBtn" class="btn view">Refresh</button>
        </div>
      </div>

      <div class="grid">
        <div>
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
            <input id="q" type="search" placeholder="Search title, seller id, location..." style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border)" />
            <button id="searchBtn" class="btn view">Search</button>
            <button id="clearBtn" class="btn view">Clear</button>
          </div>

          <div id="list" class="list" aria-live="polite"></div>
          <div id="empty" class="small-muted" style="display:none;margin-top:10px">No pending ads.</div>
        </div>

        <aside class="panel" aria-label="Admin panel">
          <div>
            <h4 style="margin:0">Selected ad</h4>
            <div id="selectedInfo" class="small-muted">None selected</div>
          </div>
          <div>
            <h4 style="margin:0">Creator</h4>
            <div id="sellerInfo" class="small-muted">Seller id shown on selection</div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>
          <div id="modalTitle" style="font-weight:900"></div>
          <div id="modalMeta" class="small-muted" style="font-size:13px"></div>
        </div>
        <div>
          <button id="modalClose" class="btn view">Close</button>
        </div>
      </div>
      <div id="modalDesc" class="small-muted"></div>
      <div style="height:8px"></div>
      <div class="modal-gallery" id="modalGallery"></div>
      <div style="height:12px"></div>
      <div style="display:flex;gap:8px">
        <button id="modalApprove" class="btn approve">Approve</button>
        <button id="modalDecline" class="btn decline">Decline</button>
      </div>
    </div>
  </div>

<script>
const BACKEND_BASE = location.origin;
const LIST_URL = BACKEND_BASE + '/api/ads?status=pending_payment';
let ADS = [];
let selectedAd = null;
let autoRefreshTimer = null;

const listEl = document.getElementById('list');
const emptyEl = document.getElementById('empty');
const selectedInfo = document.getElementById('selectedInfo');
const sellerInfo = document.getElementById('sellerInfo');

const modalBackdrop = document.getElementById('modalBackdrop');
const modalTitle = document.getElementById('modalTitle');
const modalMeta = document.getElementById('modalMeta');
const modalDesc = document.getElementById('modalDesc');
const modalGallery = document.getElementById('modalGallery');
const modalClose = document.getElementById('modalClose');
const modalApprove = document.getElementById('modalApprove');
const modalDecline = document.getElementById('modalDecline');

async function fetchPendingAds(q) {
  try {
    const url = new URL(LIST_URL);
    if (q) url.searchParams.set('q', q);
    const resp = await fetch(url.toString(), { credentials: 'include' });
    if (!resp.ok) { listEl.innerHTML = ''; emptyEl.style.display = 'block'; console.error('GET /api/ads failed', resp.status); return; }
    const data = await resp.json().catch(()=>null);
    ADS = Array.isArray(data) ? data : (data && data.ads ? data.ads : []);
    renderAds(ADS);
  } catch (e) {
    console.error('fetchPendingAds', e);
    listEl.innerHTML = ''; emptyEl.style.display = 'block';
  }
}

function renderAds(list) {
  listEl.innerHTML = '';
  if (!list || !list.length) { emptyEl.style.display = 'block'; return; }
  emptyEl.style.display = 'none';
  list.forEach(ad => {
    const el = document.createElement('div');
    el.className = 'ad-card';
    const imgSrc = Array.isArray(ad.images) && ad.images.length ? ad.images[0] : (ad.image || '');
    el.innerHTML = `
      <div class="ad-media"><img src="${escapeHtml(imgSrc)}" alt=""></div>
      <div class="ad-body">
        <div style="display:flex;justify-content:space-between">
          <div style="flex:1">
            <div class="ad-title">${escapeHtml(ad.title || 'Untitled')}</div>
            <div class="ad-desc">${escapeHtml(String(ad.description || '').slice(0,180))}</div>
            <div class="ad-meta" style="margin-top:6px">
              <div class="badge">₦${Number(ad.price||0).toLocaleString()}</div>
              <div>${ad.quantity || ad.qty || ''}</div>
              <div>${escapeHtml(ad.location || '')}</div>
              <div>${escapeHtml(ad.seller_id || '')}</div>
            </div>
          </div>
        </div>
        <div class="ad-actions">
          <button class="btn view" data-action="view" data-id="${ad.id}">View</button>
          <button class="btn approve" data-action="approve" data-id="${ad.id}">Approve</button>
          <button class="btn decline" data-action="decline" data-id="${ad.id}">Decline</button>
        </div>
      </div>
    `;
    listEl.appendChild(el);

    el.querySelector('[data-action="view"]').addEventListener('click', ()=> openModal(ad));
    el.querySelector('[data-action="approve"]').addEventListener('click', ()=> confirmAndPatch(ad.id, 'live'));
    el.querySelector('[data-action="decline"]').addEventListener('click', ()=> confirmAndPatch(ad.id, 'removed'));
  });
}

function openModal(ad) {
  selectedAd = ad;
  selectedInfo.innerHTML = `<strong>${escapeHtml(ad.title || '')}</strong><div class="small-muted">Ad id: ${ad.id}</div>`;
  sellerInfo.textContent = `Seller id: ${ad.seller_id || ''}`;
  modalTitle.textContent = ad.title || 'Untitled';
  modalMeta.textContent = `₦${Number(ad.price||0).toLocaleString()} • ${ad.quantity || ''} • ${escapeHtml(ad.location||'')}`;
  modalDesc.textContent = ad.description || '';
  modalGallery.innerHTML = '';
  const imgs = Array.isArray(ad.images) ? ad.images : (ad.images ? [ad.images] : []);
  imgs.forEach(src => {
    const i = document.createElement('img'); i.src = src; i.alt = '';
    modalGallery.appendChild(i);
  });
  modalBackdrop.style.display = 'flex';
  modalBackdrop.setAttribute('aria-hidden', 'false');
}

function closeModal(){
  modalBackdrop.style.display = 'none';
  modalBackdrop.setAttribute('aria-hidden','true');
}

modalClose.addEventListener('click', closeModal);
modalBackdrop.addEventListener('click', (e)=> { if (e.target === modalBackdrop) closeModal(); });

modalApprove.addEventListener('click', ()=> {
  if (!selectedAd) return;
  if (!confirm(`Approve "${selectedAd.title}"?`)) return;
  confirmAndPatch(selectedAd.id, 'live');
});
modalDecline.addEventListener('click', ()=> {
  if (!selectedAd) return;
  if (!confirm(`Decline "${selectedAd.title}"?`)) return;
  confirmAndPatch(selectedAd.id, 'removed');
});

async function confirmAndPatch(adId, statusValue) {
  try {
    const resp = await fetch(BACKEND_BASE + '/api/ads/' + encodeURIComponent(adId), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ status: statusValue })
    });
    const raw = await resp.text().catch(()=>null);
    let data = null;
    try { data = raw ? JSON.parse(raw) : null; } catch(e){ data = null; }
    if (resp.ok) {
      alert('OK');
      ADS = ADS.filter(a => a.id !== adId);
      renderAds(ADS);
      closeModal();
      return;
    }
    // fallback: try POST approve/decline endpoints
    if (!resp.ok) {
      if (statusValue === 'live') {
        await tryFallbackApprove(adId);
      } else {
        await tryFallbackDecline(adId);
      }
    }
    console.error('PATCH /api/ads/:id failed', resp.status, raw, data);
    alert('Update failed. Check console for details.');
  } catch (e) {
    console.error('confirmAndPatch error', e);
    alert('Network error. See console.');
  }
}

async function tryFallbackApprove(adId) {
  try {
    const urls = ['/api/admin/ads/' + adId + '/approve', '/api/ads/' + adId + '/approve'];
    for (const u of urls) {
      const resp = await fetch(BACKEND_BASE + u, { method: 'POST', credentials: 'include' });
      if (resp.ok) { ADS = ADS.filter(a => a.id !== adId); renderAds(ADS); closeModal(); return; }
    }
  } catch (e) { console.error('fallbackApprove error', e); }
}

async function tryFallbackDecline(adId) {
  try {
    const urls = ['/api/admin/ads/' + adId + '/decline', '/api/ads/' + adId + '/decline'];
    for (const u of urls) {
      const resp = await fetch(BACKEND_BASE + u, { method: 'POST', credentials: 'include' });
      if (resp.ok) { ADS = ADS.filter(a => a.id !== adId); renderAds(ADS); closeModal(); return; }
    }
  } catch (e) { console.error('fallbackDecline error', e); }
}

document.getElementById('refreshBtn').addEventListener('click', ()=> fetchPendingAds(document.getElementById('q').value.trim()));
document.getElementById('searchBtn').addEventListener('click', ()=> fetchPendingAds(document.getElementById('q').value.trim()));
document.getElementById('clearBtn').addEventListener('click', ()=> { document.getElementById('q').value=''; fetchPendingAds(); });

document.getElementById('refreshInterval').addEventListener('change', (e) => {
  const v = Number(e.target.value || 0);
  if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
  if (v > 0) autoRefreshTimer = setInterval(()=> fetchPendingAds(document.getElementById('q').value.trim()), v*1000);
});

function escapeHtml(s){ if (!s && s !== 0) return ''; return String(s).replace(/[&<>"']/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

fetchPendingAds();
</script>
</body>
</html>
