<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TradeHive — My Ads (debuggable)</title>
<link rel="icon" href="https://i.postimg.cc/zGrrd2nM/file-000000002c1c71f5961173dac3a26453.png" />
<style>
  :root{ --bg:#ffffff; --card:#ffffff; --text:#071014; --muted:#6b7280;
    --border:rgba(7,16,20,0.06); --gold1:#FFB703; --gold2:#F59E0B;
    --danger:#d64541; --success:#16a34a; --rejected:#ef4444;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:Inter, Roboto, Arial, sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1100px;margin:18px auto;padding:16px}
  header.banner{box-shadow:0 6px 30px rgba(0,0,0,0.06);position:relative;z-index:999}
  .banner-inner{max-height:110px;overflow:hidden}
  .banner img{width:100%;height:60%;object-fit:cover;max-height:110px;width:100vw;display:block}
  main.card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:12px;padding:18px;box-shadow:0 10px 40px rgba(2,6,23,0.06);border:1px solid var(--border);margin-top:-40px}
  .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .title{font-size:20px;font-weight:900;margin:0}
  .small-muted{font-size:13px;color:var(--muted)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}
  .ad-card{background:var(--card);border-radius:12px;padding:12px;border:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;position:relative;overflow:hidden}
  .ad-media{width:180px;height:130px;border-radius:8px;overflow:hidden;background:#f2f2f2;flex:0 0 180px}
  .ad-media img{width:100%;height:100%;object-fit:cover}
  .ad-body{flex:1;display:flex;flex-direction:column;gap:8px}
  .ad-title{font-weight:900}
  .ad-desc{color:var(--muted);font-size:13px}
  .ad-meta{display:flex;gap:12px;align-items:center;font-size:13px;color:var(--muted);flex-wrap:wrap}
  .ad-actions{display:flex;gap:8px;margin-top:8px}
  .btn{padding:8px 12px;border-radius:10px;border:0;cursor:pointer;font-weight:800}
  .btn.approve{background:linear-gradient(180deg,var(--gold1),var(--gold2));color:#071014}
  .btn.decline{background:#f3f4f6;color:#071014;border:1px solid var(--border)}
  .btn.view{background:transparent;border:1px dashed var(--border);color:var(--muted)}
  .badge{padding:6px 8px;border-radius:999px;font-weight:800;background:#f8fafc;border:1px solid var(--border);font-size:12px}
  .pending { background:#f2f2f2; color:#444; animation:blnk 1.2s infinite; padding:6px 8px; border-radius:999px; font-weight:800 }
  .live { background: linear-gradient(90deg,var(--gold1),var(--gold2)); color:#071014; padding:6px 8px; border-radius:999px; font-weight:900; display:inline-flex; gap:8px; align-items:center; }
  .offline { background:#fff;border:1px solid var(--border); color:var(--muted); padding:6px 8px; border-radius:999px; font-weight:800; }
  .rejected { background: rgba(239,68,68,0.08); color:var(--rejected); padding:6px 8px; border-radius:999px; font-weight:900; border:1px solid rgba(239,68,68,0.12); }
  @keyframes blnk {0%{opacity:1}50%{opacity:0.3}100%{opacity:1}}
  .muted-note{font-size:13px;color:var(--muted)}
  .small-input{padding:6px;border-radius:8px;border:1px solid var(--border)}
  .controls{display:flex;gap:8px;align-items:center;margin-bottom:12px}
  .center{display:flex;justify-content:center;align-items:center}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .tabs{display:flex;gap:8px;align-items:center;margin-bottom:12px}
  .tab{padding:8px 12px;border-radius:999px;border:1px solid var(--border);cursor:pointer;background:#fff;font-weight:800}
  .tab.active{box-shadow:0 6px 30px rgba(2,6,23,0.04);border:1px solid rgba(0,0,0,0.06)}
  .top-left{display:flex;gap:8px;align-items:center}
  .debugBtn{background:#071014;color:#FFB703;padding:8px 10px;border-radius:10px;font-weight:800}
  .debugModal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:4000}
  .debugBox{background:#fff;padding:12px;border-radius:8px;max-width:900px;width:94%;max-height:80vh;overflow:auto;font-family:monospace;font-size:12px;color:#111}
  @media (max-width:980px){ .ad-media{width:120px;height:90px} }
</style>
</head>
<body>
  <header class="banner" role="banner">
    <div class="banner-inner">
      <img src="https://i.postimg.cc/zGrrd2nM/file-000000002c1c71f5961173dac3a26453.png" alt="TradeHive banner">
    </div>
  </header>

  <div class="wrap">
    <main class="card" aria-labelledby="adsTitle">
      <div class="top-row">
        <div class="top-left">
          <a href="/dashboard.html" class="btn view" style="margin-right:8px">← Back</a>
          <div>
            <h1 id="adsTitle" class="title">My Ads — Manager</h1>
            <div class="small-muted">Track your ads: pending → live → rejected. Re-awake or delete ads below.</div>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:flex-end;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div class="controls">
              <input id="searchQ" type="search" placeholder="Search title or location..." class="small-input" />
              <button id="refreshBtn" class="btn view">Refresh</button>
            </div>
            <button id="showDebug" class="debugBtn" title="Open debug JSON">Debug</button>
          </div>

          <div class="tabs" role="tablist" aria-label="Ad status filters">
            <div class="tab active" data-filter="all">All</div>
            <div class="tab" data-filter="pending">Pending</div>
            <div class="tab" data-filter="live">Live</div>
            <div class="tab" data-filter="rejected">Rejected</div>
          </div>
        </div>
      </div>

      <div id="adsGrid" class="grid" aria-live="polite"></div>
      <div id="empty" class="empty" style="display:none">You have no ads yet.</div>
    </main>
  </div>

  <div id="viewBackdrop" style="position:fixed;inset:0;display:none;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:2000">
    <div style="background:var(--card);padding:12px;border-radius:12px;max-width:820px;width:94%;max-height:90vh;overflow:auto">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 id="viewTitle" style="margin:0">Ad</h3>
        <button id="closeView" class="btn view">Close</button>
      </div>
      <div id="viewBody" style="margin-top:8px"></div>
    </div>
  </div>

  <div id="debugModal" class="debugModal" role="dialog" aria-modal="true">
    <div class="debugBox">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <strong>Last fetch response</strong>
        <div>
          <button id="closeDebug" class="btn view">Close</button>
          <button id="copyDebug" class="btn view">Copy</button>
        </div>
      </div>
      <pre id="debugJson" style="white-space:pre-wrap;margin-top:10px;"></pre>
    </div>
  </div>

<script>
/*
  Updated frontend for ads listing with:
   - verbose console logs for every fetch
   - fallback queries (public /api/ads)
   - debug modal to inspect last JSON
   - robust image fallback
*/

const FALLBACK_BACKEND = 'https://tradehive-s4e6.onrender.com';
const BACKEND_BASE = (typeof window === 'object' && window.BACKEND_BASE) ? window.BACKEND_BASE : (location.origin || FALLBACK_BACKEND);

console.log('Ads page: BACKEND_BASE =', BACKEND_BASE);

const USER_KEY = 'wire_user_v1';
function readUser(){ try { return JSON.parse(localStorage.getItem(USER_KEY) || 'null'); } catch(e){ return null; } }
function escapeHtml(s){ if (!s && s !== 0) return ''; return String(s).replace(/[&<>"']/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

const adsGrid = document.getElementById('adsGrid');
const emptyEl = document.getElementById('empty');
const refreshBtn = document.getElementById('refreshBtn');
const searchQ = document.getElementById('searchQ');
const tabEls = Array.from(document.querySelectorAll('.tab'));
const showDebugBtn = document.getElementById('showDebug');
const debugModal = document.getElementById('debugModal');
const debugJsonEl = document.getElementById('debugJson');
const closeDebugBtn = document.getElementById('closeDebug');
const copyDebugBtn = document.getElementById('copyDebug');

let lastFetchResult = null;
let lastAdsCache = [];
let currentFilter = 'all';

refreshBtn.addEventListener('click', ()=> loadAds());
searchQ.addEventListener('input', debounce(()=> renderAds(lastAdsCache), 250));
tabEls.forEach(t => t.addEventListener('click', (ev)=>{
  tabEls.forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  currentFilter = t.getAttribute('data-filter') || 'all';
  loadAds();
}));

showDebugBtn.addEventListener('click', ()=> {
  debugJsonEl.textContent = lastFetchResult ? JSON.stringify(lastFetchResult, null, 2) : 'No fetch result yet';
  debugModal.style.display = 'flex';
});
closeDebugBtn.addEventListener('click', ()=> { debugModal.style.display = 'none'; });
copyDebugBtn.addEventListener('click', ()=> {
  if (!lastFetchResult) return alert('Nothing to copy');
  navigator.clipboard && navigator.clipboard.writeText(JSON.stringify(lastFetchResult, null, 2));
  alert('Copied to clipboard');
});

function debounce(fn, ms=200){ let to; return (...a)=>{ clearTimeout(to); to = setTimeout(()=>fn(...a), ms); }; }

function computeExpiry(createdAtIso) {
  try {
    const created = new Date(createdAtIso);
    const expiry = new Date(created.getTime() + 7 * 24 * 60 * 60 * 1000);
    return expiry;
  } catch(e){ return null; }
}
function isExpired(createdAtIso) {
  const expiry = computeExpiry(createdAtIso);
  if (!expiry) return false;
  return Date.now() > expiry.getTime();
}
function statusHtml(status, createdAtIso) {
  const st = String(status || '').toLowerCase();
  if (st === 'pending' || st === 'pending_verification' || st === 'pending_payment') {
    return `<div class="pending">● Pending</div>`;
  }
  if (st === 'live' || st === 'active') {
    return `<div class="live">● LIVE</div>`;
  }
  if (st === 'offline') {
    return `<div class="offline">Offline</div>`;
  }
  if (st === 'removed' || st === 'declined' || st === 'rejected') {
    return `<div class="rejected">● Rejected</div>`;
  }
  if (isExpired(createdAtIso)) {
    return `<div class="rejected">EXPIRED</div>`;
  }
  return `<div class="badge">${escapeHtml(String(status||'draft').toUpperCase())}</div>`;
}
function imageForAd(ad) {
  const img = (Array.isArray(ad.images) && ad.images.length) ? ad.images[0] : (ad.image || '');
  if (!img) return 'https://i.postimg.cc/hv4h8YSs/placeholder.png';
  // If the value looks like a cloudinary public_id (no protocol and no slash), don't assume it's a full url.
  if (!img.startsWith('http://') && !img.startsWith('https://')) {
    // fallback: show placeholder (can't build cloudinary url reliably here)
    return 'https://i.postimg.cc/hv4h8YSs/placeholder.png';
  }
  return img;
}

async function tryFetchJson(url, opts = {}) {
  console.log('[fetch] ->', url);
  try {
    const r = await fetch(url, opts);
    const txt = await r.text().catch(()=>null);
    let json = null;
    try { json = txt ? JSON.parse(txt) : null; } catch(e) { console.warn('Failed to parse JSON for', url, txt); }
    console.log('[fetch] <-', url, 'status=', r.status, 'json=', json);
    return { ok: r.ok, status: r.status, json, raw: txt };
  } catch (e) {
    console.error('[fetch] error', url, e);
    return { ok:false, status:0, json:null, error: String(e) };
  }
}

async function loadAds(){
  const u = readUser();
  adsGrid.innerHTML = '<div style="grid-column:1/-1" class="center muted-note">Loading...</div>';
  emptyEl.style.display = 'none';

  // Build a list of candidate URLs to try (in order). This helps debugging if one route exists but another doesn't.
  const urlsToTry = [];
  if (u && u.id) {
    urlsToTry.push(`${BACKEND_BASE}/api/my/ads?user_id=${encodeURIComponent(u.id)}`);
    // backend sometimes uses seller_id or returns via /api/ads?seller_id=...
    urlsToTry.push(`${BACKEND_BASE}/api/ads?seller_id=${encodeURIComponent(u.id)}`);
  } else {
    // public fallback
    urlsToTry.push(`${BACKEND_BASE}/api/ads`);
  }
  // also try plain /api/ads always as last resort
  if (!urlsToTry.includes(`${BACKEND_BASE}/api/ads`)) urlsToTry.push(`${BACKEND_BASE}/api/ads`);

  let result = null;
  for (const url of urlsToTry) {
    const r = await tryFetchJson(url, { credentials:'include' });
    lastFetchResult = { url, ok: r.ok, status: r.status, json: r.json, raw: r.raw, attemptedAt: (new Date()).toISOString() };
    // keep lastFetchResult for Debug modal
    if (r.ok && r.json && Array.isArray(r.json.ads)) { result = r.json; break; }
    // if server returned a success:true but ads missing, capture it and still fallback
    if (r.json && r.json.success && Array.isArray(r.json.ads)) { result = r.json; break; }
    // otherwise continue trying fallbacks
  }

  // Save lastFetchResult (already stored)
  console.log('Final fetch result saved to lastFetchResult:', lastFetchResult);

  if (!result) {
    // no route returned an ads array
    adsGrid.innerHTML = '';
    emptyEl.style.display = 'block';
    emptyEl.textContent = 'No ads found or server unreachable. Open Debug to inspect last fetch result.';
    lastAdsCache = [];
    return;
  }

  // If we got here, `result` is expected to contain an { success: true, ads: [...] }
  lastAdsCache = Array.isArray(result.ads) ? result.ads : [];
  renderAds(lastAdsCache);
}

function renderAds(ads){
  adsGrid.innerHTML = '';
  if (!ads || !ads.length) {
    emptyEl.style.display = 'block';
    emptyEl.textContent = 'No ads yet.';
    return;
  }
  emptyEl.style.display = 'none';
  const q = (searchQ.value || '').trim().toLowerCase();
  const filtered = ads.filter(a=>{
    if (!q) return true;
    return (String(a.title||'') + ' ' + String(a.location||'') + ' ' + String(a.description||'')).toLowerCase().includes(q);
  }).filter(a=>{
    if (currentFilter === 'all') return true;
    if (currentFilter === 'pending') return ['pending','pending_verification','pending_payment'].includes((a.status||'').toLowerCase());
    if (currentFilter === 'live') return ['live','active'].includes((a.status||'').toLowerCase());
    if (currentFilter === 'rejected') return ['removed','declined','rejected'].includes((a.status||'').toLowerCase()) || isExpired(a.created_at);
    return true;
  });

  if (!filtered.length) {
    emptyEl.style.display = 'block';
    emptyEl.textContent = 'No ads match your filter.';
    return;
  }

  filtered.forEach(ad=>{
    const expired = isExpired(ad.created_at);
    const status = expired ? 'expired' : (ad.status || 'draft');
    const el = document.createElement('div');
    el.className = 'ad-card';
    const img = imageForAd(ad);
    el.innerHTML = `
      <div class="ad-media"><img src="${escapeHtml(img)}" alt="" onerror="this.src='https://i.postimg.cc/hv4h8YSs/placeholder.png'"></div>
      <div class="ad-body">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="flex:1">
            <div class="ad-title">${escapeHtml(ad.title || 'Untitled')}</div>
            <div class="ad-desc">${escapeHtml(String(ad.description||'').slice(0,160))}</div>
            <div class="ad-meta" style="margin-top:8px">
              <div class="badge">₦${Number(ad.price||0).toLocaleString()}</div>
              <div>${ad.quantity || ad.qty || ''} pcs</div>
              <div>${escapeHtml(ad.location || '')}</div>
              <div style="margin-left:auto">${statusHtml(status, ad.created_at)}</div>
            </div>
          </div>
        </div>

        <div class="ad-actions">
          ${ (status === 'expired' || (ad.status||'').toLowerCase()==='removed') ? `<button class="btn approve btn-reawke" data-id="${ad.id}">Re-awake (₦1000)</button>` :
             ( (ad.status||'').toLowerCase() === 'live' ? `<button class="btn decline btn-offline" data-id="${ad.id}">Set Offline</button>` : `<button class="btn approve btn-online" data-id="${ad.id}">Set Online</button>`) }
          <button class="btn view btn-view" data-id="${ad.id}">View</button>
          <button class="btn decline btn-delete" data-id="${ad.id}" style="background:#fff;border:1px solid rgba(12,12,12,0.06)">Delete</button>
        </div>

        <div style="margin-top:8px;font-size:13px;color:var(--muted)">Posted: ${new Date(ad.created_at).toLocaleString()} • Expires: ${new Date(computeExpiry(ad.created_at)).toLocaleString()}</div>
      </div>
    `;
    adsGrid.appendChild(el);

    el.querySelectorAll('.btn-delete').forEach(b=> b.addEventListener('click', ()=> deleteAd(ad)));
    el.querySelectorAll('.btn-offline').forEach(b=> b.addEventListener('click', ()=> setAdStatus(ad,'offline')));
    el.querySelectorAll('.btn-online').forEach(b=> b.addEventListener('click', ()=> setAdStatus(ad,'live')));
    el.querySelectorAll('.btn-reawke').forEach(b=> b.addEventListener('click', ()=> reawkeAd(ad)));
    el.querySelectorAll('.btn-view').forEach(b=> b.addEventListener('click', ()=> openView(ad)));
  });
}

async function deleteAd(ad) {
  if (!confirm('Delete this ad?')) return;
  try {
    const res = await fetch(BACKEND_BASE + '/api/ads/' + encodeURIComponent(ad.id) + '/status', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',
      body: JSON.stringify({ status: 'removed' })
    });
    const j = await res.json().catch(()=>null);
    console.log('deleteAd response', j);
    if (res.ok && j && j.success) {
      alert('Ad removed');
      await loadAds();
    } else {
      alert((j && j.message) ? j.message : 'Failed to remove');
    }
  } catch (e) { console.error('deleteAd', e); alert('Network error'); }
}

async function setAdStatus(ad, status) {
  if (!confirm(`Set ad to ${status}?`)) return;
  try {
    const res = await fetch(BACKEND_BASE + '/api/ads/' + encodeURIComponent(ad.id) + '/status', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',
      body: JSON.stringify({ status })
    });
    const j = await res.json().catch(()=>null);
    console.log('setAdStatus', status, j);
    if (res.ok && j && j.success) {
      showToast('Status updated');
      await loadAds();
    } else {
      showToast((j && j.message) ? j.message : 'Failed to update status');
    }
  } catch (e) { console.error('setAdStatus', e); showToast('Network error'); }
}

async function reawkeAd(ad) {
  if (!confirm('Re-awake this ad by paying ₦1000?')) return;
  const u = readUser();
  if (!u || !u.id) { alert('Sign in required'); return; }

  const payload = {
    seller_id: u.id,
    title: ad.title,
    description: ad.description,
    images: ad.images || [],
    price: ad.price || 0,
    currency: 'NGN',
    quantity: ad.quantity || ad.qty || 1,
    location: ad.location || '',
    category: ad.category || '',
    subcategory: ad.subcategory || ad.sub || '',
    idempotency_key: 'reawaken_' + ad.id
  };
  try {
    const res = await fetch(BACKEND_BASE + '/api/ads', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',
      body: JSON.stringify(payload)
    });
    const j = await res.json().catch(()=>null);
    console.log('reawke init response', j);
    if (res.ok && j && j.success && j.init) {
      const init = j.init;
      let redirectUrl = null;
      if (init.data) redirectUrl = init.data.authorization_url || init.data.link || init.data.checkout_url || init.data.authorization_url;
      redirectUrl = redirectUrl || init.url || (init.session && init.session.url) || init.authorization_url || init.link;
      if (redirectUrl) {
        window.location.href = redirectUrl;
        return;
      } else {
        window.location.href = '/ads.html?payment=initiated&ad=' + encodeURIComponent(j.adId || '');
        return;
      }
    } else {
      alert((j && j.message) ? j.message : 'Failed to initiate payment');
    }
  } catch (e) {
    console.error('reawke', e);
    alert('Network error');
  }
}

function openView(ad) {
  document.getElementById('viewTitle').textContent = ad.title || 'Ad';
  const body = document.getElementById('viewBody');
  body.innerHTML = `
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:220px">
        <img src="${escapeHtml((Array.isArray(ad.images) && ad.images[0]) ? ad.images[0] : '')}" alt="" style="width:100%;height:260px;object-fit:cover;border-radius:8px" onerror="this.src='https://i.postimg.cc/hv4h8YSs/placeholder.png'"/>
      </div>
      <div style="flex:2;min-width:260px">
        <h3 style="margin:0">${escapeHtml(ad.title)}</h3>
        <div style="color:var(--muted);margin-top:8px">${escapeHtml(ad.description||'')}</div>
        <div style="margin-top:12px;font-weight:900">₦${Number(ad.price||0).toLocaleString()}</div>
        <div style="margin-top:8px;color:var(--muted)">Location: ${escapeHtml(ad.location||'')}</div>
        <div style="margin-top:12px">
          <button id="viewReawke" class="btn approve">Re-awake</button>
          <button id="viewDelete" class="btn decline">Delete</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('viewBackdrop').style.display = 'flex';
  document.getElementById('viewReawke').addEventListener('click', ()=> reawkeAd(ad));
  document.getElementById('viewDelete').addEventListener('click', ()=> deleteAd(ad));
}
document.getElementById('closeView').addEventListener('click', ()=> document.getElementById('viewBackdrop').style.display = 'none');

function showToast(msg, ms=2000) {
  const el = document.createElement('div');
  el.style.position = 'fixed';
  el.style.left = '50%';
  el.style.transform = 'translateX(-50%)';
  el.style.bottom = '34px';
  el.style.background = '#071014';
  el.style.color = '#FFB703';
  el.style.padding = '10px 14px';
  el.style.borderRadius = '10px';
  el.style.zIndex = 3000;
  el.style.fontWeight = '800';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=> { el.remove(); }, ms);
}

/* initial load */
loadAds();
</script>
</body>
</html>
