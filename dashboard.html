<script>
/* ============================
   Storage keys & helpers
   (I only modified behaviour — UI left intact)
   ============================ */
const LEGACY_USER_KEY = 'wire_user_v1';
const LOGIN_USER_KEY   = 'th_user';
const CART_KEY = 'wire_cart_v1';
const BACKEND_BASE = 'https://tradehive-s4e6.onrender.com';

function readUser(){
  try {
    let raw = localStorage.getItem(LOGIN_USER_KEY);
    if(raw && raw !== 'null'){
      return JSON.parse(raw);
    }
    raw = localStorage.getItem(LEGACY_USER_KEY);
    if(raw && raw !== 'null'){
      return JSON.parse(raw);
    }
    return null;
  } catch(e){ return null; }
}
function writeUser(u){
  try { localStorage.setItem(LOGIN_USER_KEY, JSON.stringify(u)); } catch(e){}
  try { localStorage.setItem(LEGACY_USER_KEY, JSON.stringify(u)); } catch(e){}
  renderCart();
}
function clearUser(){
  try { localStorage.removeItem(LOGIN_USER_KEY); } catch(e){}
  try { localStorage.removeItem(LEGACY_USER_KEY); } catch(e){}
}

function readCart(){ try { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); } catch(e){ return []; } }
function writeCart(c){ localStorage.setItem(CART_KEY, JSON.stringify(c)); renderCart(); }

/* ---------------------------

function setAvatarFromUser(){
  const u = readUser();
  const nameEl = document.getElementById('profileName');
  const emailEl = document.getElementById('profileEmail');
  const avatarBox = document.getElementById('avatarBox');
  const avatarWrap = document.getElementById('avatarWrap');
  const mini = document.getElementById('miniAvatar');

  if(u){
    nameEl.textContent = u.fullname || u.username || (u.email ? u.email.split('@')[0] : 'User');
    emailEl.textContent = u.phone || u.email || 'Member';
    if(u.avatarUrl){
      avatarBox.innerHTML = `<img src="${u.avatarUrl}" alt="avatar" style="width:100%;height:100%;object-fit:cover">`;
      mini.innerHTML = `<img src="${u.avatarUrl}" alt="mini" style="width:34px;height:34px;object-fit:cover">`;
    } else {
      const initials = (u.fullname || u.username || 'G').split(' ').map(x=>x[0]).slice(0,2).join('').toUpperCase();
      avatarBox.innerHTML = `<div style="font-weight:900;color:var(--gold1); background:linear-gradient(180deg,#fff,#faf7ef); width:100%;height:100%;display:flex;align-items:center;justify-content:center">${initials}</div>`;
      mini.innerHTML = `<div style="font-weight:900;color:var(--gold1); background:#fff; width:100%;height:100%;display:flex;align-items:center;justify-content:center">${initials}</div>`;
    }
  } else {
    nameEl.textContent = 'Guest';
    emailEl.textContent = 'Not signed in';
    avatarBox.innerHTML = `<svg viewBox="0 0 24 24" fill="none" width="42" height="42"><path d="M12 12a4 4 0 100-8 4 4 0 000 8zM4 20a8 8 0 0116 0" stroke="#9aa0a6" stroke-width="1.4" stroke-linecap="round"/></svg>`;
    mini.innerHTML = `<svg viewBox="0 0 24 24" fill="none" width="20" height="20"><path d="M12 12a4 4 0 100-8 4 4 0 000 8zM4 20a8 8 0 0116 0" stroke="#9aa0a6" stroke-width="1.4" stroke-linecap="round"/></svg>`;
  }

  const online = (u && u.online) ? true : false;
  if(online){ avatarWrap.classList.add('online'); } else { avatarWrap.classList.remove('online'); }
}

/* Try to refresh user details from backend */
async function refreshUserFromServer(){
  const u = readUser();
  if(!u || !u.id) return;
  try {
    const res = await fetch(`${BACKEND_BASE}/api/kyc/status/${encodeURIComponent(u.id)}`, { method:'GET' });
    if(!res.ok) return;
    const j = await res.json().catch(()=>null);
    if(j && j.success && j.user){
      const merged = Object.assign({}, u, j.user);
      try { if(j.user.account_details) merged.account_details = j.user.account_details; } catch(e){}
      writeUser(merged);
      setAvatarFromUser();
    }
  } catch(e){ /* ignore */ }
}

/* ---------------------------
  Status switch: use real backend endpoint /api/users/:id/online
   --------------------------- */
const statusSwitch = document.getElementById('statusSwitch');
(function initStatusSwitch(){
  const u = readUser();
  statusSwitch.checked = (u && u.online) ? true : false;
})();
statusSwitch.addEventListener('change', async ()=>{
  let u = readUser() || { username:'guest' };
  u.online = statusSwitch.checked;
  writeUser(u);
  setAvatarFromUser();
  renderProducts();
  showToast(u.online ? 'You are online' : 'You are offline');

  // persist to backend using your route: POST /api/users/:id/online
  if(u && u.id){
    try {
      // optionally include geolocation
      let lat = null, lng = null;
      try {
        const pos = await new Promise((resolve, reject) => {
          if (!navigator.geolocation) return resolve(null);
          navigator.geolocation.getCurrentPosition(p => resolve(p), err => resolve(null), { timeout: 4000 });
        });
        if (pos && pos.coords) { lat = pos.coords.latitude; lng = pos.coords.longitude; }
      } catch(e){}

      await fetch(`${BACKEND_BASE}/api/users/${encodeURIComponent(u.id)}/online`, {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        credentials: 'include',
        body: JSON.stringify({ online: u.online, lat, lng })
      }).catch(()=>null);
    } catch(e){}
  }
});

/* ---------------------------
  BACKEND ADS fetching & mapping
   - we poll every 10s; only update UI when ads data actually changes
   --------------------------- */
let BACKEND_AVAILABLE = false;
let BACKEND_ADS = null; // null => not fetched yet

function mapBackendAdToProduct(a) {
  const images = (a.images && Array.isArray(a.images) && a.images.length) ? a.images.slice() : [];
  if(!images.length && a.images && typeof a.images === 'string') {
    try {
      const parsed = JSON.parse(a.images);
      if(Array.isArray(parsed)) images.push(...parsed);
    } catch(e){}
    if(!images.length) images.push(a.images);
  }
  if(!images.length) images.push('https://i.postimg.cc/3x3z0XgY/pastry1.jpg');

  // try to find seller_online flag from backend rows (ad.seller_online, ad.online, ad.seller?.online)
  const seller_online = !!( (a.seller_online === true) || (a.online === true) || (a.seller && (a.seller.online === true)) );

  return {
    id: String(a.id || a.ad_id || a._id || ('ad_' + Math.random().toString(36).slice(2,9))),
    title: a.title || a.name || 'Untitled',
    desc: a.description || a.desc || '',
    images,
    price: Number(a.price || a.amount || 0),
    qty: Number(a.quantity || a.qty || 1),
    loc: a.location || a.city || '',
    live: String(a.status || '').toLowerCase() === 'live' || String(a.status || '').toLowerCase() === 'active',
    seller_online: seller_online,
    category: a.category || a.category_name || 'Other',
    sub: a.subcategory || a.sub || 'All',
    raw: a // keep raw row for advanced flows
  };
}

async function tryFetchBackendAds(timeoutMs = 5000) {
  const controller = new AbortController();
  const id = setTimeout(()=> controller.abort(), timeoutMs);
  try {
    const res = await fetch(`${BACKEND_BASE}/api/ads?status=live`, { signal: controller.signal, credentials:'include' });
    clearTimeout(id);
    if(!res.ok) {
      BACKEND_AVAILABLE = false;
      return null;
    }
    const json = await res.json().catch(()=>null);
    if(!json) { BACKEND_AVAILABLE = false; return null; }
    // backend might return { success: true, ads: [...] } or directly an array
    let arr = Array.isArray(json) ? json : (Array.isArray(json.ads) ? json.ads : []);
    BACKEND_AVAILABLE = true;
    return arr;
  } catch (err) {
    clearTimeout(id);
    BACKEND_AVAILABLE = false;
    return null;
  }
}

// perform an initial fetch and then poll every 10s
async function initialAndPollAds() {
  const ads = await tryFetchBackendAds(6000);
  if (ads && Array.isArray(ads)) {
    BACKEND_ADS = ads.map(mapBackendAdToProduct);
  } else {
    BACKEND_ADS = null;
  }
  renderProducts();

  // poll every 10s, but only update UI if data changed to avoid flicker
  setInterval(async ()=>{
    const newAdsRaw = await tryFetchBackendAds(4000);
    if (!newAdsRaw) return;
    // quick change detection using length + first 5 ids or JSON string
    const newIds = newAdsRaw.map(a => String(a.id || a.ad_id || a._id || '')).slice(0, 50).join(',');
    const oldIds = (BACKEND_ADS || []).map(a=>a.id).slice(0,50).join(',');
    if (newIds !== oldIds) {
      BACKEND_ADS = newAdsRaw.map(mapBackendAdToProduct);
      renderProducts();
      // also refresh orders/notifications if user present
      pollOrderNotifications();
    }
  }, 10000);
}

/* ---------------------------
  Render products (uses backend ads if present)

const productsRoot = document.getElementById('products');
async function renderProducts(){
  if(!productsRoot) return;
  // Determine active filters
  const activeCatEl = document.querySelector('.cat.active');
  const activeCat = activeCatEl ? activeCatEl.dataset.cat : 'All';
  const activeSub = document.querySelector('.subcat.active')?.dataset.sub || 'All';

  // choose data source
  let list = [];
  if(BACKEND_AVAILABLE && Array.isArray(BACKEND_ADS)) {
    list = BACKEND_ADS.slice();
  } else {
    list = PRODUCTS.slice();
  }

  // Filter
  const filtered = list.filter(p=>{
    if(activeCat !== 'All' && p.category !== activeCat) return false;
    if(activeSub !== 'All' && p.sub !== activeSub) return false;
    return true;
  });

  // render
  productsRoot.innerHTML = '';
  filtered.forEach(p=>{
    const el = document.createElement('article'); el.className='product';
    el.innerHTML = `
      <div class="media" role="button" tabindex="0" data-id="${p.id}">
        <img src="${p.images[0]}" alt="${p.title}">
        ${p.live && p.seller_online ? `<div class="live-pill"><span class="live-dot"></span> LIVE</div>` : `<div class="live-pill" style="background:#f2f2f2;color:#333">Offline</div>`}
      </div>
      <div class="body">
        <div class="p-title">${escapeHtml(p.title)}</div>
        <div class="p-desc">${escapeHtml(p.desc)}</div>
        <div class="meta"><div class="price">₦${Number(p.price).toLocaleString()}</div><div class="loc">${escapeHtml(p.loc)} • ${p.qty} pcs</div></div>
        <div class="qty-row"><label style="font-weight:700">Qty</label><input class="qty" type="number" min="1" max="${p.qty}" value="1" /></div>
        <div class="actions"><button class="btn gold addBtn">Add to cart</button><button class="btn ghost viewBtn">View</button></div>
      </div>
    `;
    productsRoot.appendChild(el);

    el.querySelector('.media').addEventListener('click', ()=> openViewModal(p));
    el.querySelector('.media').addEventListener('keydown', (e)=>{ if(e.key === 'Enter' || e.key === ' ') openViewModal(p); });

    el.querySelector('.addBtn').addEventListener('click', ()=>{
      const q = parseInt(el.querySelector('.qty').value || '1');
      addToCart(p, q, true);
    });
    el.querySelector('.viewBtn').addEventListener('click', ()=>{ openViewModal(p); });
  });
}

/* ---------------------------
  Cart UI & Escrow calculation
   --------------------------- */

function computeEscrow(totalNaira) {
  // totalNaira is number
  if (totalNaira <= 10000) return 1000;
  if (totalNaira <= 50000) return 2500;
  if (totalNaira <= 100000) return 4500;
  if (totalNaira <= 500000) return 5500;
  if (totalNaira <= 1000000) return 7500;
  return 9500;
}

function renderCart(){
  const cartList = document.getElementById('cartList');
  if(!cartList) return;
  const cart = readCart();
  cartList.innerHTML = '';
  let subtotal = 0;
  cart.forEach(item=>{
    subtotal += item.qty * item.price;
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `<img src="${escapeHtml(item.img)}" alt="" style="width:56px;height:56px;object-fit:cover;border-radius:8px;margin-right:8px">
      <div style="flex:1"><div style="font-weight:800">${escapeHtml(item.title)}</div><div style="color:var(--muted);font-size:13px">Qty: ${item.qty} • ₦${Number(item.price).toLocaleString()}</div></div>
      <div><button class="btn ghost remove" data-id="${item.id}">Remove</button></div>`;
    cartList.appendChild(div);
  });

  const escrow = computeEscrow(subtotal);
  const grand = subtotal + escrow;

  // show totals (add escrow and note)
  const totalEl = document.getElementById('cartTotal');
  if (totalEl) totalEl.textContent = '₦' + Number(grand).toLocaleString();

  // Show an escrow breakdown line in the cartFooter; if not present, create it
  const cartFooter = document.querySelector('.cart-footer');
  if (cartFooter) {
    // Remove previous escrow row if any
    let escrowRow = document.getElementById('cartEscrowRow');
    if (!escrowRow) {
      escrowRow = document.createElement('div');
      escrowRow.id = 'cartEscrowRow';
      escrowRow.style.marginTop = '8px';
      escrowRow.style.fontSize = '13px';
      cartFooter.insertBefore(escrowRow, cartFooter.firstChild);
    }
    escrowRow.innerHTML = `<div style="display:flex;justify-content:space-between"><div>Escrow fee</div><div>₦${Number(escrow).toLocaleString()}</div></div>
    <div style="font-size:12px;color:var(--muted);margin-top:6px">An escrow fee is added to protect buyers & sellers. This cart subtotal ₦${Number(subtotal).toLocaleString()} will attract an escrow of ₦${Number(escrow).toLocaleString()}.</div>`;
  }

  // update cart count
  const cartCountEl = document.getElementById('cartCount');
  if(cartCountEl) {
    const count = cart.reduce((s,i)=>s+i.qty,0);
    cartCountEl.textContent = count;
    cartCountEl.setAttribute('aria-label', `${count} items in cart`);
  }

  // enable proceed if cart not empty and backend available
  const checkoutBtn = document.getElementById('checkoutNow');
  if (checkoutBtn) {
    checkoutBtn.disabled = cart.length === 0;
    if (!BACKEND_AVAILABLE && cart.length > 0) {
      // allow, but warn on click
    }
  }

  // attach remove handlers
  Array.from(document.querySelectorAll('.remove')).forEach(b=>{
    b.addEventListener('click', (e)=>{
      const id = e.target.dataset.id;
      const c = readCart().filter(x=>x.id!==id);
      writeCart(c);
      renderCart();
      showToast('Removed');
    });
  });
}

/* ---------------------------
  Checkout → create orders & payments (POST /api/ads/:id/buy)
  - For each cart item we call your backend buy route.
  - If backend returns payment init info with redirect URL we open it.
  - If multiple payments (multiple sellers) we open each init URL (one per payment).
  --------------------------- */
document.getElementById('checkoutNow').addEventListener('click', async () => {
  const cart = readCart();
  if (!cart || !cart.length) { showToast('Cart empty'); return; }
  const u = readUser();
  if (!u || !u.id) { alert('Please sign in to checkout'); return; }
  if (!BACKEND_AVAILABLE) {
    alert('Backend unavailable — cannot process payments in demo mode.');
    return;
  }

  // group by ad id (cart items contain product ids that should match backend ad ids)
  // We'll perform POST /api/ads/:id/buy for each item
  const results = [];
  const redirectUrls = [];
  const errors = [];

  // inform user we're processing
  showToast('Creating orders...');

  for (const item of cart) {
    // item.id must correspond to a backend ad id; if it looks like a demo product id (starts with 'p' or 'ad_' without numeric id),
    // try to use the raw mapping if BACKEND_ADS contains it; otherwise report and skip.
    let adId = item.id;
    // If product is from BACKEND_ADS map, prefer original ad id
    if (BACKEND_AVAILABLE && Array.isArray(BACKEND_ADS)) {
      const match = BACKEND_ADS.find(x => String(x.id) === String(item.id) || (x.raw && String(x.raw.id) === String(item.id)));
      if (match && match.raw && match.raw.id) adId = String(match.raw.id);
    }

    try {
      // idempotency key for this cart item
      const idempotency_key = `cart_${item.id}_${(Date.now()).toString().slice(-6)}`;

      // call buy route
      const resp = await fetch(`${BACKEND_BASE}/api/ads/${encodeURIComponent(adId)}/buy`, {
        method: 'POST',
        credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ buyer_id: u.id, qty: item.qty || 1, idempotency_key })
      }).catch(e => null);

      if (!resp) {
        errors.push({ item, message: 'Network error' }); continue;
      }
      const j = await resp.json().catch(()=>null);
      results.push({ item, status: resp.status, body: j });

      // if provider init returned, attempt to extract redirect URL
      if (j && j.init) {
        // common provider keys
        const init = j.init;
        let redirect = null;
        if (init.data) redirect = init.data.authorization_url || init.data.link || init.data.checkout_url || null;
        redirect = redirect || init.url || init.authorization_url || init.link || (init.session && init.session.url) || null;
        // also some backends include init.authorization_url at top, etc.
        if (redirect) redirectUrls.push({ item, url: redirect, paymentId: j.paymentId || (j.init && j.init.data && j.init.data.reference) || null });
      }
    } catch (e) {
      errors.push({ item, message: (e && e.message) ? e.message : String(e) });
    }
  }

  // handle results
  if (errors.length) {
    console.warn('Checkout errors', errors);
    alert('Some items could not be created. See console for details.');
  }

  if (redirectUrls.length === 0) {
    // no provider redirect returned for any payment
    // show summary to user and clear cart (orders were created server-side if backend returned success)
    let successCount = results.filter(r => r.status >=200 && r.status < 300).length;
    if (successCount > 0) {
      alert(`Created ${successCount} order(s). Please check My Orders for details.`);
      writeCart([]); renderCart();
      // try to navigate to myorders page
      window.location.href = 'myorders.html';
    } else {
      alert('No payment initiation returned. Check server logs.');
    }
    return;
  }

  // If only one redirect -> go there
  if (redirectUrls.length === 1) {
    const url = redirectUrls[0].url;
    // redirect user to provider checkout
    window.location.href = url;
    return;
  }

  // If multiple redirects (multiple seller payments), open each in new tab (best-effort)
  // and show a short summary for the user to complete the payments.
  const opened = [];
  for (const r of redirectUrls) {
    try {
      const w = window.open(r.url, '_blank');
      if (w) opened.push(r);
    } catch(e){}
  }

  // Clear cart (orders already created) and notify user
  writeCart([]);
  renderCart();

  let message = `Created ${results.length} order(s). ${redirectUrls.length} payment pages opened for completion.`;
  message += '\nIf any payment didn\'t open, check "My Orders" and contact support.';
  alert(message);
  // redirect to my orders
  window.location.href = 'myorders.html';
});

/* ---------------------------
  Helper: add to cart & UI confirmations
   --------------------------- */
function addToCart(product, qty, showConfirm=false){
  const cart = readCart();
  const found = cart.find(i=>i.id===product.id);
  if(found){ found.qty = Math.min(found.qty + qty, product.qty); }
  else cart.push({ id:product.id, qty, title:product.title, price:product.price, img:product.images[0] });
  writeCart(cart);
  if(showConfirm){
    document.getElementById('confirmItem').textContent = `${qty} × ${product.title}`;
    document.getElementById('confirmBackdrop').style.display='flex';
  } else {
    showToast('Added to cart');
  }
}

  showToast('Item kept in cart.');
});

/* ---------------------------
  Product VIEW modal (details + gallery)
   --------------------------- */
const viewBackdrop = document.getElementById('viewBackdrop');
const viewImageEl = document.getElementById('viewImage');
const viewThumbs = document.getElementById('viewThumbs');
const viewTitle = document.getElementById('viewName');
const viewDesc = document.getElementById('viewDesc');
const viewPrice = document.getElementById('viewPrice');
const viewLoc = document.getElementById('viewLoc');
const viewQty = document.getElementById('viewQty');
let viewCurrentProduct = null;
let viewCurrentIndex = 0;

function openViewModal(product){
  viewCurrentProduct = product;
  viewCurrentIndex = 0;
  viewTitle.textContent = product.title;
  viewDesc.textContent = product.desc;
  viewPrice.textContent = '₦' + Number(product.price).toLocaleString();
  viewLoc.textContent = product.loc + ' • ' + product.qty + ' pcs';
  viewQty.value = 1;
  renderViewGallery(product.images);
  viewImageEl.src = product.images[0];
  viewBackdrop.style.display = 'flex';
  viewBackdrop.setAttribute('aria-hidden','false');
}

function renderViewGallery(images){
  viewThumbs.innerHTML = '';
  images.forEach((src, i)=>{
    const thumb = document.createElement('div');
    thumb.className = 'view-thumb' + (i===0 ? ' active' : '');
    thumb.innerHTML = `<img src="${src}" style="width:100%;height:100%;object-fit:cover" alt="thumb">`;
    thumb.addEventListener('click', ()=> {
      viewCurrentIndex = i;
      viewImageEl.src = images[i];
      Array.from(viewThumbs.children).forEach(c=>c.classList.remove('active'));
      thumb.classList.add('active');
    });
    viewThumbs.appendChild(thumb);
  });
}

document.getElementById('closeView').addEventListener('click', ()=> {
  viewBackdrop.style.display='none';
  viewBackdrop.setAttribute('aria-hidden','true');
});
document.getElementById('viewAdd').addEventListener('click', ()=>{
  if(!viewCurrentProduct) return;
  const q = Math.max(1, Math.min(viewCurrentProduct.qty, parseInt(viewQty.value || '1')));
  addToCart(viewCurrentProduct, q, false);
  renderCart(); // update totals & button
  showToast('Added to cart');
});

/* ---------------------------
  Bank modal: POST to /api/users/:id/bank (backend route you provided)
   --------------------------- */
const bankBackdrop = document.getElementById('bankBackdrop');
document.getElementById('linkBank').addEventListener('click', (e)=>{ e.preventDefault(); openBankModal(); });
document.getElementById('bankCancel').addEventListener('click', ()=> { bankBackdrop.style.display='none'; bankBackdrop.setAttribute('aria-hidden','true'); });

document.getElementById('bankSave').addEventListener('click', async ()=>{
  const name = document.getElementById('bankAccountName').value.trim();
  const number = document.getElementById('bankAccountNumber').value.trim();
  const bname = document.getElementById('bankName').value.trim();
  const bcode = document.getElementById('bankCode').value.trim();

  if(!name || !number || !bname){
    showToast('Please complete account name, number & bank name');
    return;
  }

  const u = readUser() || {};
  const acct = { account_number: String(number), bank_code: String(bcode || ''), name: String(name) };

  // store local copy
  u.account_details = Object.assign({}, u.account_details || {}, acct);
  writeUser(u);
  showToast('Bank details saved locally');

  // persist to backend: POST /api/users/:id/bank (preferred), fallback to PATCH /api/users/:id
  if(u && u.id){
    let ok = false;
    try {
      // preferred route: POST /api/users/:id/bank
      const res = await fetch(`${BACKEND_BASE}/api/users/${encodeURIComponent(u.id)}/bank`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        credentials: 'include',
        body: JSON.stringify({ account_number: number, bank_code: bcode, name })
      }).catch(()=>null);
      if (res && res.ok) ok = true;
    } catch(e){}

    if(!ok){
      try {
        const res2 = await fetch(`${BACKEND_BASE}/api/users/${encodeURIComponent(u.id)}`, {
          method:'PATCH',
          headers:{ 'Content-Type':'application/json' },
          credentials: 'include',
          body: JSON.stringify({ account_details: acct })
        }).catch(()=>null);
        if (res2 && res2.ok) ok = true;
      } catch(e){}
    }

    if(ok) showToast('Bank details saved to server');
    else showToast('Saved locally; server endpoint not available');
  }

  bankBackdrop.style.display='none';
  bankBackdrop.setAttribute('aria-hidden','true');
});

function openBankModal(){
  const u = readUser() || {};
  const acct = (u && u.account_details) ? u.account_details : {};
  document.getElementById('bankAccountName').value = acct.account_name || acct.name || '';
  document.getElementById('bankAccountNumber').value = acct.account_number || acct.accountNumber || '';
  document.getElementById('bankName').value = acct.bank_name || acct.bank || '';
  document.getElementById('bankCode').value = acct.bank_code || acct.bank_code || '';
  bankBackdrop.style.display='flex';
  bankBackdrop.setAttribute('aria-hidden','false');
  closeDrawer();
}

/* ---------------------------
  Notifications / Orders polling (best-effort)
   - Poll /api/my/orders?user_id=... to count active orders
   - update navMessages badge if any pending/uncompleted orders
   --------------------------- */
async function pollOrderNotifications(){
  const u = readUser();
  if (!u || !u.id) return;
  try {
    // try /api/my/orders first
    const res = await fetch(`${BACKEND_BASE}/api/my/orders?user_id=${encodeURIComponent(u.id)}`, { credentials: 'include' });
    if (!res.ok) {
      // fallback to /api/orders?user_id=
      const r2 = await fetch(`${BACKEND_BASE}/api/orders?user_id=${encodeURIComponent(u.id)}`, { credentials: 'include' }).catch(()=>null);
      if (!r2 || !r2.ok) {
        // endpoint missing — nothing to do
        return;
      }
      const j2 = await r2.json().catch(()=>null);
      if (j2 && j2.success && Array.isArray(j2.orders)) updateOrderBadge(j2.orders);
      else if (Array.isArray(j2)) updateOrderBadge(j2);
      return;
    }
    const j = await res.json().catch(()=>null);
    if (j && j.success && Array.isArray(j.orders)) updateOrderBadge(j.orders);
    else if (Array.isArray(j)) updateOrderBadge(j);
  } catch(e){}
}
function updateOrderBadge(orders){
  const navMessages = document.getElementById('navMessages');
  if (!navMessages) return;
  const pending = orders.filter(o => !['completed','released','cancelled'].includes((o.status||'').toLowerCase()));
  // add small badge if pending.length > 0
  if (pending.length) {
    navMessages.classList.add('has-orders');
    navMessages.setAttribute('title', `${pending.length} active order(s)`);
    // show a little numeric badge
    let b = navMessages.querySelector('.order-badge');
    if (!b) {
      b = document.createElement('div');
      b.className = 'order-badge';
      b.style.position = 'absolute';
      b.style.top = '6px';
      b.style.right = '8px';
      b.style.background = 'red';
      b.style.color = '#fff';
      b.style.padding = '2px 6px';
      b.style.borderRadius = '999px';
      b.style.fontSize = '11px';
      b.style.fontWeight = '800';
      navMessages.appendChild(b);
    }
    b.textContent = pending.length;
  } else {
    navMessages.classList.remove('has-orders');
    const b = navMessages.querySelector('.order-badge');
    if (b) b.remove();
  }
}

// poll every 15s
setInterval(()=>{ pollOrderNotifications(); }, 15000);

  Utilities & init
   --------------------------- */
function escapeHtml(s){ if (!s && s !== 0) return ''; return String(s).replace(/[&<>"']/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function showToast(msg, ms=2200){ const t = document.getElementById('toast'); t.textContent = msg; t.style.display='block'; clearTimeout(showToast._t); showToast._t = setTimeout(()=> t.style.display='none', ms); }

  renderCart();
  renderProducts();
  renderCart();
  pollOrderNotifications();
})();
