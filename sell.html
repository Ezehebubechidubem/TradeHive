<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TradeHive — Post Ads</title>
<style>
  :root{
    --bg: #ffffff;
    --card: #ffffff;
    --text: #071014;
    --muted: #6b7280;
    --border: rgba(7,16,20,0.06);
    --gold1: #FFB703;
    --gold2: #F59E0B;
  }

  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:Inter, Roboto, Arial, sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:920px;margin:18px auto;padding:20px}

  /* Banner/header — MATCHES registration/login sizing exactly */
  header.banner{
    width:100%;
    display:block;
    box-shadow: 0 6px 30px rgba(0,0,0,0.12);
    position:relative;
    z-index:999;
  }
  .banner .banner-inner {
    width:100%;
    max-height: 110px; /* same as registration/login */
    overflow:hidden;
  }
  .banner img{
    width:100%;
    height:60%;
    display:block;
    object-fit: cover;
    max-height: 110px;
    width:100vw;
  }

  /* card + form */
  main.card{
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:12px;
    padding:18px;
    box-shadow: 0 10px 40px rgba(2,6,23,0.06);
    border: 1px solid var(--border);
    max-width:920px;
    margin-top:-40px; /* same lift as registration/login */
  }

  h1.title{margin:6px 0 12px 0;font-size:20px;font-weight:900;text-align:left}
  label{display:block;margin-bottom:6px;color:var(--text);font-weight:700}
  input[type="text"], input[type="number"], textarea, select {
    width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text);
  }
  textarea{min-height:120px;resize:vertical}
  .row{display:flex;gap:12px}
  .col{flex:1;min-width:0}
  .muted{color:var(--muted);font-size:13px}
  .btn{display:inline-flex;padding:10px 14px;border-radius:10px;background:linear-gradient(180deg,var(--gold1),var(--gold2));color:#071014;font-weight:800;border:0;cursor:pointer}
  .thumb{width:84px;height:84px;border-radius:8px;object-fit:cover;border:1px solid var(--border); background:#fff}
  .gallery{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:flex-start}
  .small{font-size:13px;color:var(--muted)}
  .remove-btn{display:inline-block;padding:6px 8px;background:#fff;border-radius:8px;border:1px solid var(--border);cursor:pointer}
  .meta{display:flex;gap:8px;align-items:center}
  @media (max-width:820px){
    .row{flex-direction:column}
    .wrap{padding:12px}
    main.card{margin-top:-20px;padding:16px}
  }
</style>
</head>
<body>

  <!-- Banner/header (identical behavior/size to registration/login) -->
  <header class="banner" role="banner" aria-label="TradeHive banner">
    <div class="banner-inner">
      <img src="https://i.postimg.cc/zGrrd2nM/file-000000002c1c71f5961173dac3a26453.png" alt="TradeHive banner">
    </div>
  </header>

  <div class="wrap">
    <main class="card" aria-labelledby="postTitle">
      <h1 id="postTitle" class="title">Post Ads</h1>

      <form id="sellForm" onsubmit="return false;" aria-describedby="imgHint" novalidate>
        <label for="title">Title</label>
        <input id="title" name="title" type="text" placeholder="Short descriptive title" required />

        <label for="description" style="margin-top:10px">Description</label>
        <textarea id="description" name="description" placeholder="Describe product, condition, size, shipping, etc"></textarea>

        <div class="row" style="margin-top:10px">
          <div class="col">
            <label for="category">Category</label>
            <select id="category" name="category" aria-label="Category">
              <option>Clothing</option>
              <option>Electronics</option>
              <option>Foods</option>
              <option>Services</option>
              <option>Other</option>
            </select>
          </div>
          <div class="col">
            <label for="subcategory">Subcategory</label>
            <input id="subcategory" name="subcategory" type="text" placeholder="e.g., Men, Phones, Pastry"/>
          </div>
        </div>

        <div class="row" style="margin-top:10px">
          <div class="col">
            <label for="price">Price (NGN)</label>
            <input id="price" name="price" type="number" min="0" placeholder="0" required />
          </div>
          <div class="col">
            <label for="qty">Quantity</label>
            <input id="qty" name="qty" type="number" min="1" value="1" />
          </div>
        </div>

        <div style="margin-top:10px">
          <label for="location">Location (City / Town)</label>
          <input id="location" name="location" type="text" placeholder="Lagos, Onitsha..." />
        </div>

        <div style="margin-top:12px">
          <label for="images">Images (up to 6)</label>
          <input id="images" type="file" accept="image/*" multiple />
          <div id="imgHint" class="small">Max 6 images. Client-side resizing/compression runs before upload.</div>

          <div style="margin-top:8px; display:flex; gap:8px; align-items:flex-start;">
            <div class="gallery" id="thumbs" aria-live="polite" aria-atomic="true"></div>
            <div id="imgActions" style="margin-left:auto; display:flex; gap:8px; flex-direction:column;">
              <button id="clearImages" type="button" class="remove-btn" title="Clear images">Clear</button>
            </div>
          </div>
        </div>

        <div style="margin-top:14px; display:flex; gap:10px; align-items:center;">
          <button id="post" class="btn" type="button" aria-label="Post ad">Post Ad</button>
          <div class="muted meta" id="postStatus" role="status" aria-live="polite"></div>
        </div>
      </form>
    </main>
  </div>

<script>
/* Backend + client-side image compression + JSON payload (images as data URLs)
   Backend URL — update if needed.
*/
const BACKEND_URL = 'https://tradehive-s4e6.onrender.com';
const MAX_IMAGES = 6;
const MAX_WIDTH = 1200;
const QUALITY = 0.80;

const imagesInput = document.getElementById('images');
const thumbs = document.getElementById('thumbs');
const postBtn = document.getElementById('post');
const postStatus = document.getElementById('postStatus');
const clearImagesBtn = document.getElementById('clearImages');

let compressedImages = [];

// utility: compress image to JPEG data URL using canvas
async function compressImageFile(file, maxWidth = MAX_WIDTH, quality = QUALITY) {
  // create image bitmap or Image element
  let img;
  if (typeof createImageBitmap === 'function') {
    const bitmap = await createImageBitmap(file);
    // draw to canvas
    const originalWidth = bitmap.width;
    const originalHeight = bitmap.height;
    const scale = originalWidth > maxWidth ? (maxWidth / originalWidth) : 1;
    const targetW = Math.max(1, Math.round(originalWidth * scale));
    const targetH = Math.max(1, Math.round(originalHeight * scale));
    const canvas = document.createElement('canvas');
    canvas.width = targetW;
    canvas.height = targetH;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(bitmap, 0, 0, targetW, targetH);
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
    const dataUrl = await blobToDataURL(blob);
    return { dataUrl, size: blob.size };
  } else {
    img = await new Promise((resolve, reject) => {
      const i = new Image();
      i.onload = () => resolve(i);
      i.onerror = reject;
      i.src = URL.createObjectURL(file);
    });
    const originalWidth = img.width;
    const originalHeight = img.height;
    const scale = originalWidth > maxWidth ? (maxWidth / originalWidth) : 1;
    const targetW = Math.max(1, Math.round(originalWidth * scale));
    const targetH = Math.max(1, Math.round(originalHeight * scale));
    const canvas = document.createElement('canvas');
    canvas.width = targetW;
    canvas.height = targetH;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, targetW, targetH);
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
    const dataUrl = await blobToDataURL(blob);
    return { dataUrl, size: blob.size };
  }
}

function blobToDataURL(blob) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.onerror = reject;
    fr.readAsDataURL(blob);
  });
}

function renderThumbnails() {
  thumbs.innerHTML = '';
  compressedImages.forEach((item, idx) => {
    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.flexDirection = 'column';
    wrapper.style.alignItems = 'center';
    wrapper.style.gap = '6px';

    const img = document.createElement('img');
    img.src = item.dataUrl;
    img.className = 'thumb';
    img.alt = item.name || `image-${idx+1}`;
    wrapper.appendChild(img);

    const info = document.createElement('div');
    info.className = 'small';
    info.style.fontSize = '12px';
    info.style.color = 'var(--muted)';
    info.textContent = `${Math.round(item.size/1024)} KB`;
    wrapper.appendChild(info);

    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.textContent = 'Remove';
    removeBtn.className = 'remove-btn';
    removeBtn.addEventListener('click', () => {
      compressedImages.splice(idx, 1);
      renderThumbnails();
    });
    wrapper.appendChild(removeBtn);

    thumbs.appendChild(wrapper);
  });
}

imagesInput.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []).slice(0, MAX_IMAGES);
  if (!files.length) return;
  const available = MAX_IMAGES - compressedImages.length;
  const toProcess = files.slice(0, available);
  if (!toProcess.length) {
    alert(`Maximum ${MAX_IMAGES} images allowed`);
    imagesInput.value = '';
    return;
  }

  postStatus.textContent = 'Compressing images...';
  postBtn.disabled = true;

  for (const file of toProcess) {
    try {
      const res = await compressImageFile(file);
      compressedImages.push({ name: file.name, dataUrl: res.dataUrl, size: res.size });
    } catch (err) {
      console.error('Compression error', err);
      // fallback: include original file as data URL
      try {
        const fallback = await blobToDataURL(file);
        compressedImages.push({ name: file.name, dataUrl: fallback, size: file.size });
      } catch(e){}
    }
  }

  renderThumbnails();
  postStatus.textContent = '';
  postBtn.disabled = false;
  imagesInput.value = '';
});

clearImagesBtn.addEventListener('click', () => {
  compressedImages = [];
  renderThumbnails();
});

postBtn.addEventListener('click', async () => {
  const title = document.getElementById('title').value.trim();
  const desc = document.getElementById('description').value.trim();
  const category = document.getElementById('category').value;
  const subcategory = document.getElementById('subcategory').value.trim();
  const priceVal = document.getElementById('price').value;
  const price = priceVal === '' ? NaN : Number(priceVal);
  const qty = Number(document.getElementById('qty').value) || 1;
  const location = document.getElementById('location').value.trim();

  if (!title) { alert('Please provide a title'); return; }
  if (isNaN(price)) { alert('Please provide a valid price'); return; }

  // Build JSON payload (images as data URLs)
  const payload = {
    seller_id: (function(){ try{ return JSON.parse(localStorage.getItem('th_user')||localStorage.getItem('wc_user')||'null')?.id || 'guest'; }catch(e){return 'guest';} })(),
    title,
    description: desc,
    price,
    quantity: qty,
    currency: 'NGN',
    location,
    category,
    subcategory,
    images: compressedImages.map(i => i.dataUrl)
  };

  // quick size check
  const jsonLength = JSON.stringify(payload).length;
  if (jsonLength > 6_000_000) {
    if (!confirm('Payload is large and may fail on slow connections. Continue?')) return;
  }

  postStatus.textContent = 'Posting — uploading...';
  postBtn.disabled = true;

  try {
    const resp = await fetch(BACKEND_URL + '/api/ads', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify(payload)
    });

    const data = await resp.json().catch(()=>null);

    if (resp.ok && data && data.success) {
      postStatus.textContent = 'Ad created';
      // If provider requires payment, open authorization URL
      if (data.init && data.init.data && data.init.data.authorization_url) {
        const url = data.init.data.authorization_url;
        if (confirm('Posting requires a fee. Open payment page now?')) window.open(url, '_blank');
      } else if (data.init && data.init.url) {
        if (confirm('Open payment page now?')) window.open(data.init.url, '_blank');
      } else {
        alert('Ad posted. Check My Ads for status.');
        window.location.href = 'ads.html';
      }
    } else {
      const message = (data && data.message) ? data.message : `Failed to create ad (HTTP ${resp.status})`;
      alert(message);
      postStatus.textContent = '';
    }
  } catch (err) {
    console.error('Post ad error', err);
    alert('Network error while posting ad.');
    postStatus.textContent = '';
  } finally {
    postBtn.disabled = false;
  }
});

// warn if unsaved edits
window.addEventListener('beforeunload', (e) => {
  if (compressedImages.length || document.getElementById('title').value || document.getElementById('description').value) {
    e.preventDefault();
    e.returnValue = '';
  }
});
</script>
</body>
</html>
